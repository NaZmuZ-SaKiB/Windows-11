<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <script src="https://kit.fontawesome.com/97f3b6f30e.js" crossorigin="anonymous"></script>

        <link rel="shortcut icon" href="img/start-icon.png" type="image/x-icon">
        <link rel="stylesheet" href="style.css" type="text/css">

        <title>Windows 11</title>
    </head>
    <body>
        <div class="container">
            <div class="taskbar">
                <div class="icons">
                    <ul>
                        <li id="start-icon"><img src="img/start-icon.png"></li>
                        <li id="search-icon"><img src="img/search-icon.png"></li>
                        <li><img src="img/task-view-icon.png"></li>
                        <li><img src="img/widgets-icon.png"></li>
                        <li id="file-start" style="display: none;"><img src="img/file-explorer-small.png"></li>
                        <li><img src="img/edge-icon.png"></li>
                        <li><img src="img/vscode-icon.png"></li>
                        <li><img src="img/store-icon.png"></li>
                    </ul>
                </div>
                <img class="right" src="img/taskbarright.PNG">
            </div>
            <div class="start-menu common" id="start-menu">
                <img src="img/startmenu.PNG">
                <img class="start-file-icon" id="file-explorer-icon" src="img/file-icon-startmenu.png">
            </div>
            <div class="search-bar common" id="search-bar">
                <img src="img/searchbar.jpg">
                <input class="search-bar-input" type="text" placeholder="Type here to search">
                <img class="file-explorer-icon" id="file-explorer-icon" src="img/file-icon.jpg">
            </div>
            <div class="file-explorer" id="file-explorer">
                <img src="img/file-explorer.png">
                <span id="file-explorar-close">&times;</span>
                <span id="file-explorar-max">&square;</span>
                <span id="file-explorar-normal">&#10064;</span>
                <span id="file-explorar-min">_</span>
            </div>

            <video muted autoplay>
                <source src="video.webm" type="video/webm">
            </video>

        </div>
        
        <script src="script.js"></script>
    </body>
</html>
